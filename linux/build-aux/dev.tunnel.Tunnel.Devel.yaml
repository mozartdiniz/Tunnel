app-id: dev.tunnel.Tunnel.Devel

runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin

command: tunnel

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --own-name=dev.tunnel.Tunnel.Devel
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.portal.FileChooser
  - --talk-name=org.freedesktop.portal.Inhibit
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: tunnel
    buildsystem: meson
    config-opts:
      - -Dprofile=development
    build-options:
      env:
        CARGO_HOME: /run/build/tunnel/cargo
        CARGO_NET_OFFLINE: 'true'
    sources:
      - type: dir
        path: ..
      - cargo-sources.json
