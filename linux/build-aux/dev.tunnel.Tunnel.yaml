app-id: dev.tunnel.Tunnel

runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin

command: tunnel

finish-args:
  # Network access for LocalSend UDP multicast discovery and HTTPS file transfer
  - --share=network
  # X11 shared memory (required alongside fallback-x11)
  - --share=ipc
  # Wayland display server (primary)
  - --socket=wayland
  # X11 fallback for non-Wayland compositors
  - --socket=fallback-x11
  # GPU acceleration for GTK4 rendering
  - --device=dri
  # Allow the app to own its well-known D-Bus name (required for D-Bus activation)
  - --own-name=dev.tunnel.Tunnel
  # Download directory — where received files are saved
  - --filesystem=xdg-download
  # File chooser portal — lets the app access files the user selects
  - --talk-name=org.freedesktop.portal.FileChooser
  # Inhibit portal — prevents sleep/idle during active transfers
  - --talk-name=org.freedesktop.portal.Inhibit
  # System notifications
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: tunnel
    buildsystem: meson
    subdir: linux
    config-opts:
      - -Dprofile=default
    build-options:
      env:
        CARGO_HOME: /run/build/tunnel/cargo
        CARGO_NET_OFFLINE: 'true'
    sources:
      - type: dir
        path: ../..
      # JSON array of crate archive sources — generated by:
      #   python3 build-aux/flatpak-cargo-generator.py Cargo.lock \
      #           -o build-aux/cargo-sources.json
      # Re-run whenever Cargo.lock changes and commit the result.
      - cargo-sources.json
