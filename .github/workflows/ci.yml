name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Validate desktop entry and AppStream metadata ─────────────────────────
  validate:
    name: Validate metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validators
        run: sudo apt-get install -y --no-install-recommends desktop-file-utils appstream

      - name: Validate desktop file
        run: desktop-file-validate linux/data/dev.tunnel.Tunnel.desktop.in

      - name: Validate AppStream metainfo
        run: |
          appstreamcli validate \
            --no-net \
            --explain \
            linux/data/dev.tunnel.Tunnel.metainfo.xml.in

  # ── Build and bundle the Flatpak (development profile) ───────────────────
  flatpak:
    name: Flatpak build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      # Generate cargo-sources.json from the committed Cargo.lock.
      # The result is written to build-aux/ so the manifest can find it.
      - name: Generate cargo-sources.json
        run: |
          python3 linux/build-aux/flatpak-cargo-generator.py \
            linux/Cargo.lock \
            --module-name tunnel \
            -o linux/build-aux/cargo-sources.json

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: dev.tunnel.Tunnel.Devel.flatpak
          manifest-path: linux/build-aux/dev.tunnel.Tunnel.Devel.yaml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev.tunnel.Tunnel.Devel
          path: dev.tunnel.Tunnel.Devel.flatpak
          retention-days: 14
